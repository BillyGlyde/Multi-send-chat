<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All AI Chat</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header id="header">
      <h1>All AI Chat</h1>
      <p class="subtitle">Send to multiple AI chats at once</p>
    </header>

    <!-- Window selector panel -->
    <section id="window-panel">
      <div class="panel-header">
        <h2>Target Windows</h2>
        <div class="panel-actions">
          <button id="btn-refresh" title="Refresh window list">&#x21bb; Refresh</button>
          <button id="btn-select-all" title="Select all">Select All</button>
          <button id="btn-deselect-all" title="Deselect all">Deselect All</button>
        </div>
      </div>
      <div id="window-list">
        <div class="placeholder">Click "Refresh" to scan for open windows...</div>
      </div>
    </section>

    <!-- Text input area -->
    <section id="input-panel">
      <div id="status-bar">
        <span id="selected-count">0 windows selected</span>
        <span id="send-status"></span>
      </div>
      <div id="input-container">
        <textarea
          id="text-input"
          placeholder="Type your message and press Enter to send to all selected windows... (Shift+Enter for new line)"
          rows="3"
        ></textarea>
        <button id="btn-send" title="Send (Enter)">Send &#x27A4;</button>
      </div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
