<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All AI Chat</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header id="header">
      <h1>All AI Chat</h1>
      <p class="subtitle">Send to multiple AI chats at once</p>
    </header>

    <!-- Window selector panel -->
    <section id="window-panel">
      <div class="panel-header">
        <h2>Target Windows</h2>
        <div class="panel-actions">
          <button id="btn-refresh" title="Refresh window list">&#x21bb; Refresh</button>
          <button id="btn-select-all" title="Select all">Select All</button>
          <button id="btn-deselect-all" title="Deselect all">Deselect All</button>
        </div>
      </div>
      <div id="window-list">
        <div class="placeholder">Click "Refresh" to scan for open windows...</div>
      </div>
    </section>

    <!-- Bulk Rating panel -->
    <section id="rating-panel">
      <div class="panel-header">
        <h2>Bulk Rate Responses</h2>
        <span id="rating-status"></span>
      </div>
      <div id="rating-buttons">
        <button id="btn-thumbs-up" title="Rate all responses thumbs up" disabled>
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M7 10v12"/>
            <path d="M15 5.88 14 10h5.83a2 2 0 0 1 1.92 2.56l-2.33 8A2 2 0 0 1 17.5 22H4a2 2 0 0 1-2-2v-8a2 2 0 0 1 2-2h2.76a2 2 0 0 0 1.79-1.11L12 2a3.13 3.13 0 0 1 3 3.88Z"/>
          </svg>
          <span>Thumbs Up All</span>
        </button>
        <button id="btn-thumbs-down" title="Rate all responses thumbs down" disabled>
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 14V2"/>
            <path d="M9 18.12 10 14H4.17a2 2 0 0 1-1.92-2.56l2.33-8A2 2 0 0 1 6.5 2H20a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2h-2.76a2 2 0 0 0-1.79 1.11L12 22a3.13 3.13 0 0 1-3-3.88Z"/>
          </svg>
          <span>Thumbs Down All</span>
        </button>
      </div>
    </section>

    <!-- Text input area -->
    <section id="input-panel">
      <div id="status-bar">
        <span id="selected-count">0 windows selected</span>
        <span id="send-status"></span>
      </div>
      <div id="input-container">
        <textarea
          id="text-input"
          placeholder="Type your message and press Enter to send to all selected windows... (Shift+Enter for new line)"
          rows="3"
        ></textarea>
        <button id="btn-send" title="Send (Enter)">Send &#x27A4;</button>
      </div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
